<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loan Approval Prediction</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 700px; background: white; padding: 30px; margin: auto; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; margin-top: 15px; }
        button:hover { background-color: #218838; }
        .result { margin-top: 20px; padding: 15px; border-radius: 4px; text-align: center; font-size: 18px; font-weight: bold; }
        .approved { background-color: #d4edda; color: #155724; }
        .rejected { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏦 Loan Approval Prediction</h2>
    <form action="/predict" method="POST">
        
        <div class="grid-2">
            <div class="form-group"><label>Applicant Income ($):</label><input type="number" name="ApplicantIncome" value="5000" step="any" required></div>
            <div class="form-group"><label>Coapplicant Income ($):</label><input type="number" name="CoapplicantIncome" value="2000" step="any" required></div>
        </div>

        <div class="grid-2">
            <div class="form-group"><label>Age:</label><input type="number" name="Age" value="35" step="any" required></div>
            <div class="form-group"><label>Dependents:</label><input type="number" name="Dependents" value="1" step="any" required></div>
        </div>

        <div class="grid-2">
            <div class="form-group"><label>Credit Score (300-850):</label><input type="number" name="Credit_Score" value="700" step="any" required></div>
            <div class="form-group"><label>Existing Loans:</label><input type="number" name="Existing_Loans" value="0" step="any" required></div>
        </div>

        <div class="grid-2">
            <div class="form-group"><label>DTI Ratio (e.g. 0.35):</label><input type="number" name="DTI_Ratio" value="0.3" step="any" required></div>
            <div class="form-group"><label>Savings ($):</label><input type="number" name="Savings" value="15000" step="any" required></div>
        </div>

        <div class="grid-2">
            <div class="form-group"><label>Collateral Value ($):</label><input type="number" name="Collateral_Value" value="50000" step="any" required></div>
            <div class="form-group"><label>Loan Amount ($):</label><input type="number" name="Loan_Amount" value="25000" step="any" required></div>
        </div>

        <div class="grid-2">
            <div class="form-group"><label>Loan Term (Months):</label><input type="number" name="Loan_Term" value="360" step="any" required></div>
            <div class="form-group">
                <label>Education Level:</label>
                <select name="Education_Level" required>
                    <option value="1">Graduate</option>
                    <option value="0">Not Graduate</option>
                </select>
            </div>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label>Employment Status:</label>
                <select name="Employment_Status" required>
                    <option value="Salaried">Salaried</option>
                    <option value="Self-employed">Self-employed</option>
                    <option value="Unemployed">Unemployed</option>
                </select>
            </div>
            <div class="form-group">
                <label>Marital Status:</label>
                <select name="Marital_Status" required>
                    <option value="Single">Single</option>
                    <option value="Married">Married</option>
                </select>
            </div>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label>Loan Purpose:</label>
                <select name="Loan_Purpose" required>
                    <option value="Personal">Personal</option>
                    <option value="Car">Car</option>
                    <option value="Education">Education</option>
                    <option value="Home">Home</option>
                </select>
            </div>
            <div class="form-group">
                <label>Property Area:</label>
                <select name="Property_Area" required>
                    <option value="Urban">Urban</option>
                    <option value="Semiurban">Semiurban</option>
                    <option value="Rural">Rural</option>
                </select>
            </div>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label>Gender:</label>
                <select name="Gender" required>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
            <div class="form-group">
                <label>Employer Category:</label>
                <select name="Employer_Category" required>
                    <option value="Private">Private</option>
                    <option value="Government">Government</option>
                    <option value="MNC">MNC</option>
                    <option value="Unemployed">Unemployed</option>
                </select>
            </div>
        </div>

        <button type="submit">Predict Status</button>
    </form>

    {% if prediction_text %}
        <div class="result {{ 'approved' if 'APPROVED' in prediction_text else 'rejected' }}">
            {{ prediction_text }}
        </div>
    {% endif %}
</div>

</body>
</html>
